name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[site]"

      - name: Compile
        run: python -m compileall -q fleshwound tests

      - name: Lint
        run: ruff check fleshwound tests

      - name: Type-check
        run: mypy fleshwound

      - name: Test
        run: python -m pytest -q
